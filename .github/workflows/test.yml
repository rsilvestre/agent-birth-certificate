name: CI — Build & Test

on:
  push:
    branches: [main, sui-pivot]
  pull_request:
    branches: [main]

jobs:
  sui-build:
    name: Build Move contracts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Sui CLI
        run: |
          curl -fsSL https://github.com/MystenLabs/sui/releases/latest/download/sui-testnet-v1.70.2-ubuntu-x86_64.tgz -o sui.tgz || \
          curl -fsSL https://github.com/MystenLabs/sui/releases/download/mainnet-v1.70.2/sui-mainnet-v1.70.2-ubuntu-x86_64.tgz -o sui.tgz
          tar xzf sui.tgz
          chmod +x sui
          sudo mv sui /usr/local/bin/
          sui --version || echo "Sui install may need different binary name"

      - name: Build Move package
        run: cd move && sui move build

      - name: Run Move tests
        run: cd move && sui move test

  node-check:
    name: MCP server check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MCP server deps
        run: cd mcp-server && npm ci --no-audit --no-fund

      - name: Verify MCP server loads
        run: cd mcp-server && timeout 5 node index.mjs 2>&1 || true
