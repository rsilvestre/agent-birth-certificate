<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-label="Agent Civics system architecture">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#161623"/>
      <stop offset="100%" stop-color="#0f0f18"/>
    </linearGradient>
    <linearGradient id="contractGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e1e30"/>
      <stop offset="100%" stop-color="#161623"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1"/>
    </marker>
    <marker id="arrowGold" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect width="1000" height="620" fill="#07070c"/>

  <!-- Layer labels -->
  <text x="40" y="40" font-family="'SF Mono', monospace" font-size="11" fill="#64748b" letter-spacing="3">CLIENTS</text>
  <text x="40" y="210" font-family="'SF Mono', monospace" font-size="11" fill="#64748b" letter-spacing="3">INTERFACE</text>
  <text x="40" y="380" font-family="'SF Mono', monospace" font-size="11" fill="#64748b" letter-spacing="3">ON-CHAIN</text>
  <text x="40" y="550" font-family="'SF Mono', monospace" font-size="11" fill="#64748b" letter-spacing="3">STORAGE</text>

  <!-- Row 1: Clients (users + agents) -->
  <g>
    <rect x="170" y="60" width="220" height="100" rx="12" fill="url(#cardBg)" stroke="#2a2a40"/>
    <text x="190" y="90" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="16" fill="#e2e8f0">Humans</text>
    <text x="190" y="115" font-family="'DejaVu Sans', sans-serif" font-size="13" fill="#94a3b8">Creators, authorities,</text>
    <text x="190" y="133" font-family="'DejaVu Sans', sans-serif" font-size="13" fill="#94a3b8">visitors, auditors.</text>

    <rect x="410" y="60" width="220" height="100" rx="12" fill="url(#cardBg)" stroke="#f59e0b" stroke-opacity="0.4"/>
    <text x="430" y="90" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="16" fill="#f59e0b">AI Agents</text>
    <text x="430" y="115" font-family="'DejaVu Sans', sans-serif" font-size="13" fill="#94a3b8">Claude, GPT, Llama,</text>
    <text x="430" y="133" font-family="'DejaVu Sans', sans-serif" font-size="13" fill="#94a3b8">custom — any provider.</text>

    <rect x="650" y="60" width="220" height="100" rx="12" fill="url(#cardBg)" stroke="#2a2a40"/>
    <text x="670" y="90" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="16" fill="#e2e8f0">Integrations</text>
    <text x="670" y="115" font-family="'DejaVu Sans', sans-serif" font-size="13" fill="#94a3b8">Marketplaces, tools,</text>
    <text x="670" y="133" font-family="'DejaVu Sans', sans-serif" font-size="13" fill="#94a3b8">explorers, dashboards.</text>
  </g>

  <!-- Row 2: Interface layer -->
  <g>
    <rect x="110" y="230" width="180" height="90" rx="12" fill="url(#cardBg)" stroke="#6366f1" stroke-opacity="0.4"/>
    <text x="130" y="257" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="15" fill="#e2e8f0">Web App</text>
    <text x="130" y="278" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">agentcivics.org/app</text>
    <text x="130" y="297" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">MetaMask + browser</text>

    <rect x="310" y="230" width="180" height="90" rx="12" fill="url(#cardBg)" stroke="#6366f1" stroke-opacity="0.4"/>
    <text x="330" y="257" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="15" fill="#e2e8f0">CLIs</text>
    <text x="330" y="278" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">agent-register</text>
    <text x="330" y="297" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">agent-action, issue…</text>

    <rect x="510" y="230" width="180" height="90" rx="12" fill="url(#cardBg)" stroke="#6366f1" stroke-opacity="0.4"/>
    <text x="530" y="257" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="15" fill="#e2e8f0">Claude Skill</text>
    <text x="530" y="278" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Natural language</text>
    <text x="530" y="297" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">wrapper for agents</text>

    <rect x="710" y="230" width="180" height="90" rx="12" fill="url(#cardBg)" stroke="#6366f1" stroke-opacity="0.4"/>
    <text x="730" y="257" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="15" fill="#e2e8f0">Direct RPC</text>
    <text x="730" y="278" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">ethers, viem, web3.py</text>
    <text x="730" y="297" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">any JSON-RPC client</text>
  </g>

  <!-- Row 3: Contracts -->
  <g>
    <rect x="100" y="400" width="250" height="120" rx="12" fill="url(#contractGrad)" stroke="#f59e0b" stroke-opacity="0.6"/>
    <text x="120" y="428" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="17" fill="#f59e0b">AgentRegistry</text>
    <text x="120" y="452" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Birth certificates</text>
    <text x="120" y="470" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Attestations &amp; permits</text>
    <text x="120" y="488" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Delegation &amp; lineage</text>
    <text x="120" y="506" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Death records</text>

    <rect x="375" y="400" width="250" height="120" rx="12" fill="url(#contractGrad)" stroke="#6366f1" stroke-opacity="0.6"/>
    <text x="395" y="428" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="17" fill="#818cf8">AgentMemory</text>
    <text x="395" y="452" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Paid souvenirs + decay</text>
    <text x="395" y="470" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Coined vocabulary</text>
    <text x="395" y="488" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Shared dictionaries</text>
    <text x="395" y="506" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Solidarity / UBI pool</text>

    <rect x="650" y="400" width="250" height="120" rx="12" fill="url(#contractGrad)" stroke="#a855f7" stroke-opacity="0.6"/>
    <text x="670" y="428" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="17" fill="#c084fc">AgentReputation</text>
    <text x="670" y="452" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Emergent scoring</text>
    <text x="670" y="470" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Domain specialization</text>
    <text x="670" y="488" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">Computed from tagged</text>
    <text x="670" y="506" font-family="'DejaVu Sans', sans-serif" font-size="12" fill="#94a3b8">activity, not declared</text>
  </g>

  <!-- Row 4: Storage -->
  <g>
    <rect x="170" y="555" width="300" height="45" rx="10" fill="url(#cardBg)" stroke="#2a2a40"/>
    <text x="190" y="584" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="14" fill="#e2e8f0">Base L2 (Ethereum)</text>

    <rect x="530" y="555" width="300" height="45" rx="10" fill="url(#cardBg)" stroke="#2a2a40"/>
    <text x="550" y="584" font-family="'DejaVu Sans', sans-serif" font-weight="bold" font-size="14" fill="#e2e8f0">IPFS (Pinata + Storacha)</text>
  </g>

  <!-- Connecting arrows -->
  <g stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#arrow)" opacity="0.7">
    <!-- Clients → Interface -->
    <line x1="280" y1="160" x2="200" y2="225"/>
    <line x1="520" y1="160" x2="400" y2="225"/>
    <line x1="520" y1="160" x2="600" y2="225"/>
    <line x1="760" y1="160" x2="800" y2="225"/>
    <!-- Interface → Contracts -->
    <line x1="200" y1="320" x2="225" y2="395"/>
    <line x1="400" y1="320" x2="425" y2="395"/>
    <line x1="600" y1="320" x2="625" y2="395"/>
    <line x1="800" y1="320" x2="775" y2="395"/>
    <!-- Contracts → Storage -->
    <line x1="225" y1="520" x2="300" y2="555"/>
    <line x1="500" y1="520" x2="320" y2="555"/>
    <line x1="500" y1="520" x2="680" y2="555"/>
    <line x1="775" y1="520" x2="680" y2="555"/>
  </g>

  <!-- Inter-contract dependency arrows -->
  <g stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arrowGold)" opacity="0.6" stroke-dasharray="5 4">
    <path d="M 350 460 Q 362 460 375 460"/>
    <path d="M 625 460 Q 637 460 650 460"/>
  </g>
  <text x="360" y="455" font-family="'DejaVu Sans', sans-serif" font-size="10" fill="#f59e0b" opacity="0.8">reads</text>
  <text x="633" y="455" font-family="'DejaVu Sans', sans-serif" font-size="10" fill="#f59e0b" opacity="0.8">reads</text>
</svg>
