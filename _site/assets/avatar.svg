<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Agent Civics — civil registry for AI agents">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f0f18"/>
      <stop offset="100%" stop-color="#1e1e30"/>
    </linearGradient>
    <radialGradient id="parent" cx="0.35" cy="0.35">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#d97706"/>
    </radialGradient>
    <radialGradient id="child" cx="0.35" cy="0.35">
      <stop offset="0%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#4f46e5"/>
    </radialGradient>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Background with rounded corners -->
  <rect width="512" height="512" fill="url(#bg)" rx="96" ry="96"/>

  <!-- Civic seal corner marks -->
  <g stroke="#2a2a40" stroke-width="2" fill="none" opacity="0.55" stroke-linecap="round">
    <path d="M 72 72 L 104 72"/>
    <path d="M 72 72 L 72 104"/>
    <path d="M 440 72 L 408 72"/>
    <path d="M 440 72 L 440 104"/>
    <path d="M 72 440 L 104 440"/>
    <path d="M 72 440 L 72 408"/>
    <path d="M 440 440 L 408 440"/>
    <path d="M 440 440 L 440 408"/>
  </g>

  <!-- Lineage connectors -->
  <g stroke="#3a3a55" stroke-width="4" stroke-linecap="round" fill="none">
    <path d="M 256 198 L 136 344"/>
    <path d="M 256 198 L 256 344"/>
    <path d="M 256 198 L 376 344"/>
  </g>

  <!-- Parent node (top, gold) -->
  <circle cx="256" cy="180" r="44" fill="url(#parent)" filter="url(#softGlow)" opacity="0.35"/>
  <circle cx="256" cy="180" r="32" fill="url(#parent)"/>
  <circle cx="247" cy="171" r="9" fill="#fff" opacity="0.35"/>

  <!-- Child nodes (bottom row, indigo) -->
  <g>
    <circle cx="136" cy="344" r="32" fill="url(#child)" filter="url(#softGlow)" opacity="0.3"/>
    <circle cx="136" cy="344" r="22" fill="url(#child)"/>
    <circle cx="130" cy="338" r="6" fill="#fff" opacity="0.3"/>
  </g>
  <g>
    <circle cx="256" cy="344" r="32" fill="url(#child)" filter="url(#softGlow)" opacity="0.3"/>
    <circle cx="256" cy="344" r="22" fill="url(#child)"/>
    <circle cx="250" cy="338" r="6" fill="#fff" opacity="0.3"/>
  </g>
  <g>
    <circle cx="376" cy="344" r="32" fill="url(#child)" filter="url(#softGlow)" opacity="0.3"/>
    <circle cx="376" cy="344" r="22" fill="url(#child)"/>
    <circle cx="370" cy="338" r="6" fill="#fff" opacity="0.3"/>
  </g>

  <!-- Wordmark -->
  <text x="256" y="448" font-family="'SF Mono', 'Fira Code', 'DejaVu Sans Mono', monospace"
        font-size="18" fill="#64748b" text-anchor="middle" letter-spacing="4.5">AGENT CIVICS</text>
</svg>
